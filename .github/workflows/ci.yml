# CI — every push and PR runs the same four gates used locally:
# typecheck, lint (0 warnings), unit tests, production build.
# The env values are the public-by-design client keys (same ones committed
# in vercel.json); no secrets belong here.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://jhxuflzmqspidkvjckox.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_sshJXQoxX0NZqUeU-uBObQ_aSgQaHRa
      NEXT_PUBLIC_FIVEMANAGE_API_KEY: Z3ctM38GCUw5aPam9xscHYcxjghj8iTE
      NEXT_PUBLIC_FIVEMANAGE_BASE_URL: https://api.fivemanage.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Handbook content in sync with docs
        # -I ignores the volatile git-derived date line (shallow CI checkouts can't reproduce it)
        run: npm run gen:handbook && git diff -I'HANDBOOK_UPDATED' --exit-code src/components/devdocs/handbookContent.ts
      - name: User guide drift check
        run: npm run gen:guide && git diff --exit-code src/components/guide/guideContent.ts
      - name: Schema artifacts sync check
        run: npm run check:schema
      - name: Snapshot freshness check
        # Content-based: every migration must leave a trace in
        # supabase/schema-snapshot.sql (scripts/check-snapshot-freshness.mjs).
        run: npm run check:freshness
      - name: Dead exports / dead deps (knip)
        run: npm run check:dead
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint (zero warnings)
        run: npx eslint src --max-warnings 0
      - name: Unit tests
        run: npm test
      - name: Production build
        run: npm run build
      - name: Bundle budget (shared first-load JS)
        # Advisory while the current src/ sweep settles; promote to blocking
        # (drop continue-on-error) after the budget in
        # scripts/check-bundle-budget.mjs is re-baselined on the merged tree.
        continue-on-error: true
        run: npm run check:bundle

  # Live security suites — run only when the rls-test-* account passwords are
  # configured as repository secrets (Settings → Secrets → Actions). Without
  # them the vitest suite self-skips (exit 0) and the Playwright steps are
  # bypassed, so forks and secretless clones stay green.
  security-suites:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://jhxuflzmqspidkvjckox.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_sshJXQoxX0NZqUeU-uBObQ_aSgQaHRa
      NEXT_PUBLIC_FIVEMANAGE_API_KEY: Z3ctM38GCUw5aPam9xscHYcxjghj8iTE
      NEXT_PUBLIC_FIVEMANAGE_BASE_URL: https://api.fivemanage.com
      RLS_TEST_PASSWORD_LSB: ${{ secrets.RLS_TEST_PASSWORD_LSB }}
      RLS_TEST_PASSWORD_BCB: ${{ secrets.RLS_TEST_PASSWORD_BCB }}
      RLS_TEST_PASSWORD_INACTIVE: ${{ secrets.RLS_TEST_PASSWORD_INACTIVE }}
      RLS_TEST_PASSWORD_OWNER: ${{ secrets.RLS_TEST_PASSWORD_OWNER }}
      RLS_TEST_PASSWORD_LEAD: ${{ secrets.RLS_TEST_PASSWORD_LEAD }}
      RLS_TEST_PASSWORD_DIRECTOR: ${{ secrets.RLS_TEST_PASSWORD_DIRECTOR }}
      RLS_TEST_PASSWORD_TARGET: ${{ secrets.RLS_TEST_PASSWORD_TARGET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: RLS/RPC security-wall suite (self-skips without secrets)
        run: npm run test:rls
      - name: Install Playwright browser
        if: env.RLS_TEST_PASSWORD_LSB != ''
        run: npx playwright install chromium --with-deps
      - name: Build for E2E
        if: env.RLS_TEST_PASSWORD_LSB != ''
        run: npm run build
      - name: E2E smoke + axe a11y ratchet
        # tests/e2e includes a11y.spec.ts (axe, baseline in
        # tests/e2e/a11y-baseline.json); it self-skips without the secrets
        # like every other live spec, so forks stay green.
        if: env.RLS_TEST_PASSWORD_LSB != ''
        run: npm run test:e2e
